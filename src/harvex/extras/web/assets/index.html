<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>harvex · 数据浏览</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">fx<span>harvest</span></div>
    <nav class="tabs">
      <a href="#records" class="tab" data-view="records">记录</a>
      <a href="#health" class="tab" data-view="health">数据健康</a>
    </nav>
    <div class="meta" id="total-badge">—</div>
  </header>

  <!-- 记录视图 -->
  <main id="view-records" class="view">
    <div class="toolbar">
      <input id="search" type="search" placeholder="搜索全部字段…" autocomplete="off">
      <div class="pager">
        <button id="prev" disabled>‹ 上一页</button>
        <span id="page-info" class="page-info">—</span>
        <button id="next" disabled>下一页 ›</button>
      </div>
    </div>
    <div class="table-wrap">
      <table id="records-table">
        <thead><tr id="head-row"></tr></thead>
        <tbody id="body"></tbody>
      </table>
    </div>
    <div id="records-empty" class="empty" hidden>没有匹配的记录。</div>
  </main>

  <!-- 健康视图 -->
  <main id="view-health" class="view" hidden>
    <section class="cards" id="health-cards"></section>
    <h2 class="section-title">最近抓取流水</h2>
    <div class="table-wrap">
      <table id="runs-table">
        <thead><tr>
          <th>源</th><th>状态</th><th class="num">本轮</th><th class="num">总数</th>
          <th>开始</th><th>结束</th><th>错误</th>
        </tr></thead>
        <tbody id="runs-body"></tbody>
      </table>
    </div>
  </main>

  <!-- 详情抽屉 -->
  <div id="drawer" class="drawer" hidden>
    <div class="drawer-panel">
      <button id="drawer-close" class="drawer-close" aria-label="关闭">×</button>
      <h3>记录详情</h3>
      <dl id="detail-list"></dl>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
